<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Scroll Builder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>

<body>
    <!-- Admin Panel -->
    <aside class="admin-panel">
        <header>
            <h1>Scroll Portfolio</h1>
            <h2>스크롤 포트폴리오 생성기</h2>
        </header>

        <form id="projectForm">
            <div class="form-group">
                <label for="year">연도</label>
                <input type="number" id="year" placeholder="2025" required>
            </div>
            <div class="form-group">
                <label for="title">프로젝트명</label>
                <input type="text" id="title" placeholder="프로젝트 제목" required>
            </div>
            <div class="form-group">
                <label for="client">발주처</label>
                <input type="text" id="client" placeholder="발주처 (선택)">
            </div>
            <button type="submit" class="btn-primary" id="submitBtn">데이터 추가</button>
        </form>

        <section>
            <label>항목 리스트</label>
            <div id="projectList" class="project-list"></div>
        </section>

        <section class="gas-section">
            <label>Google Sheets 연동</label>
            <div class="form-group" style="margin-bottom:0.5rem">
                <input type="text" id="gasUrl" placeholder="GAS 웹앱 URL" style="font-size:0.72rem">
            </div>
            <div style="display:flex;gap:0.4rem;margin-bottom:0.4rem">
                <button type="button" id="saveToSheetBtn" class="btn-primary btn-save"
                    style="flex:1;padding:0.55rem;font-size:0.72rem">저장</button>
                <button type="button" id="loadFromSheetBtn" class="btn-primary btn-load"
                    style="flex:1;padding:0.55rem;font-size:0.72rem">불러오기</button>
            </div>
            <div id="gasStatus" class="gas-status"></div>
        </section>

        <button type="button" id="exportBtn" class="btn-primary btn-export">HTML로 추출하기</button>
    </aside>

    <!-- Preview Panel (scroll container) -->
    <main class="preview-panel" id="previewPanel">
        <div class="viewer-container">
            <div class="viewer-left">
                <div class="year-display">
                    <div class="year-roller" id="yearRoller"></div>
                </div>
            </div>
            <div class="viewer-right" id="viewerRight"></div>
            <div class="timeline-nav" id="timelineNav"></div>
        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
