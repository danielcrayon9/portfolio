<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Profile — Career</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
    :root{--bg:#F9F9F8;--text:#111;--dim:#666;--light:#999;--border:rgba(0,0,0,0.08);--font:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;--col-left:11.5rem;--gap:15rem}
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{background:var(--bg);color:var(--text);font-family:var(--font)}
    body{overflow-y:auto;line-height:1.5}
    .page{max-width:70rem;margin:0 auto;padding:3.25rem 1.25rem 4rem}
    .sec{display:grid;grid-template-columns:var(--col-left) minmax(0,1fr);column-gap:var(--gap);row-gap:.75rem;padding:2rem 0;border-bottom:1px solid var(--border);align-items:start}
    .sec:first-of-type{padding-top:0}
    .sec:last-of-type{border-bottom:none}
    .sec-title{font-size:1.28rem;font-weight:700;letter-spacing:.05em;line-height:1.2;color:#000;text-transform:uppercase;word-break:break-word;hyphens:auto;max-width:100%;padding-right:.25rem}
    .sec-body{min-width:0}
    .ic{display:flex;flex-direction:column;gap:.65rem}
    .career-p{font-size:1.02rem;font-weight:400;line-height:1.65;color:var(--text)}
    .career-p.dim{color:#444}
    .career-h{font-size:.9rem;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-top:.55rem}
    .career-list{margin:.2rem 0 0 1.05rem;padding:0}
    .career-list li{margin:.32rem 0;font-size:1rem;line-height:1.55;color:#222}
    .career-group{margin-top:.45rem}
    .career-group-title{font-size:.92rem;font-weight:700;margin-bottom:.35rem;color:var(--text)}
    .select-type-link{position:fixed;top:10px;left:10px;z-index:10;font-family:var(--font);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;color:#3a3a3a;background:#fff;border:1px solid rgba(0,0,0,.12);padding:5px 10px;border-radius:999px}
    @media(max-width:1100px){
    :root{--col-left:minmax(0,1fr);--gap:0.5rem}
    .sec{grid-template-columns:1fr}
    .sec-title{padding-bottom:0}
    }
</style>
</head>
<body>
<a class="select-type-link" href="../index.html">Select Type</a>
<main class="page" id="main"></main>
<script>
var SECTIONS=[
{left:'PROFESSIONAL PROFILE',blocks:['<p class="career-p">공공기관 디지털 서비스 및 통계 플랫폼 구축 전문가 (20+ Years Experience)</p><p class="career-p dim">국회, 한국은행, 중앙부처, 지방자치단체 등 국가 핵심기관의 디지털 서비스 구축 및 운영 프로젝트를 20년 이상 수행해 온 UI/UX 디자인, 반응형 웹 퍼블리싱, 웹 접근성 전문가입니다.</p><p class="career-p dim">특히 공공 데이터 플랫폼, 통계 시스템, 행정 서비스 포털 구축 프로젝트에 특화된 경험을 보유하고 있으며, 대규모 공공 시스템에서 UI/UX 설계, 웹 접근성 표준 구축, 서비스 운영 최적화를 수행해 왔습니다.</p><p class="career-p dim">다수의 공공기관 시스템에서 KWCAG 기반 웹 접근성 인증을 획득하며 접근성 설계 및 품질 관리 역량을 축적했습니다.</p>']},
{left:'CORE COMPETENCIES',blocks:['<div class="career-group"><p class="career-group-title">공공기관 디지털 서비스 구축</p><ul class="career-list"><li>국회, 한국은행, 중앙부처 등 국가 핵심기관 시스템 구축</li><li>대규모 행정 서비스 및 공공 포털 UI/UX 설계</li></ul></div><div class="career-group"><p class="career-group-title">통계 및 데이터 플랫폼</p><ul class="career-list"><li>국가 통계 시스템 UI/UX 설계</li><li>데이터 시각화 및 통계 서비스 인터페이스 구축</li></ul></div><div class="career-group"><p class="career-group-title">프론트엔드 퍼블리싱</p><ul class="career-list"><li>HTML5 / CSS3 기반 시맨틱 마크업</li><li>반응형 웹 퍼블리싱</li><li>웹 접근성 기반 UI 구현</li></ul></div><div class="career-group"><p class="career-group-title">웹 접근성 및 표준화</p><ul class="career-list"><li>KWCAG 2.1 기반 접근성 설계</li><li>공공기관 웹 접근성 인증 프로젝트 수행</li><li>접근성 UI 컴포넌트 및 마크업 표준 구축</li></ul></div><div class="career-group"><p class="career-group-title">대형 장기 운영 시스템</p><ul class="career-list"><li>장기 운영 공공 시스템 UI/UX 개선</li><li>서비스 운영 효율성 및 유지보수 최적화</li></ul></div>']},
{left:'MAJOR CLIENTS',blocks:['<p class="career-p dim">대한민국 국회 / 한국은행 / 서울특별시 / 경기도청 / 환경부 / 행정안전부 / HF한국주택금융공사 / 한국부동산원 / 국립중앙의료원 / 한국형사정책연구원 / 에너지경제연구원 / 국가보훈처 / 한국바이오협회 / 기획재정부 / TBS교통방송</p>']},
{left:'REPRESENTATIVE EXPERIENCE',blocks:['<p class="career-h">대한민국 국회 디지털 서비스 구축 및 운영</p><p class="career-p"><strong>기간</strong> · 2024 ~ 2025</p><p class="career-p"><strong>Role</strong> · UI/UX 디자인 및 퍼블리싱 총괄, 웹 접근성 설계 및 표준 구축</p><p class="career-p"><strong>Contribution</strong> · 공공 웹 접근성 표준 기반 UI 컴포넌트 설계, 공통 UI/UX 가이드 체계 구축, 디자인·개발·기획 조직 간 품질 관리</p><p class="career-p"><strong>Achievement</strong> · 국회 주요 서비스 웹 접근성 인증 획득, 공통 UI/UX 가이드 도입으로 서비스 일관성 확보, 접근성 이슈 감소 및 유지보수 효율 향상</p>']},
{left:'KEY PROJECTS',blocks:['<div class="career-group"><p class="career-group-title">1. 국회 시스템</p><p class="career-p dim">국회 주요 서비스 UI/UX 및 퍼블리싱 총괄 — 국회 대표 홈페이지(국문·영문·모바일), 의안정보시스템, 국민동의청원, 입법예고, 국회 통합예약, 국회뉴스ON, 헌정포털, 열린국회정보, 국회의정연수원, 국회 AI 의정지원 플랫폼</p></div><div class="career-group"><p class="career-group-title">2. 금융 및 경제 통계 시스템</p><p class="career-p dim">한국은행 스냅샷, ECOS, 채용시스템, DAS, HF 주택금융통계시스템, 한국부동산원 R-ONE, 에너지경제연구원 KESIS</p></div><div class="career-group"><p class="career-group-title">3. 공공 데이터 플랫폼</p><p class="career-p dim">서울시 열린데이터광장, 경기데이터드림, 환경통계정보시스템, 재난안전 데이터 포털</p></div><div class="career-group"><p class="career-group-title">4. 공공 의료 데이터 시스템</p><p class="career-p dim">국립중앙의료원 응급의료정보망, 응급의료 통계 포털, 시립병원 통계 시스템, 아이안심톡</p></div>']},
{left:'WEB ACCESSIBILITY CERTIFICATION PROJECTS',blocks:['<p class="career-p dim">다수 공공기관 서비스에서 웹 접근성 품질인증 획득</p><p class="career-h" style="margin-top:1rem">대표 사이트</p><ul class="career-list"><li>국회 대표 홈페이지, 의안정보시스템, 입법예고 시스템</li><li>NABOSTATS 재정경제통계, HF 주택금융통계 시스템</li><li>환경부 환경통계포털, 한국부동산원 부동산 통계 시스템</li><li>국립중앙의료원 아이안심톡, 경기데이터드림, CCJS 범죄통계포털</li></ul>']},
{left:'CAREER HIGHLIGHTS',blocks:['<ul class="career-list"><li>공공기관 디지털 서비스 구축 20년 이상 경험</li><li>국회 및 국가 통계 시스템 다수 구축</li><li>웹 접근성 인증 프로젝트 다수 수행</li><li>대형 공공 데이터 플랫폼 UI/UX 설계 경험</li></ul>']}
];
var main=document.getElementById('main');
SECTIONS.forEach(function(sec){
var s=document.createElement('section');
s.className='sec';
var h=document.createElement('h2');
h.className='sec-title';
h.textContent=sec.left;
var bd=document.createElement('div');
bd.className='sec-body';
var inner=document.createElement('div');
inner.className='ic';
sec.blocks.forEach(function(html){inner.insertAdjacentHTML('beforeend',html);});
bd.appendChild(inner);
s.appendChild(h);
s.appendChild(bd);
main.appendChild(s);
});
</script>
</body>
</html>
